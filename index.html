<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sensas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="s-home" class="screen active">
  <div class="home-wrap">
    <h1>🍽️ Sensas</h1>
    <p>Vérificateur allergènes</p>
    <button class="btn btn-primary" onclick="showScreen('s-filter')">🔍 Filtre Allergies</button>
    <button class="btn btn-secondary" onclick="showScreen('s-list')">📋 Liste des Aliments</button>
  </div>
</div>

<div id="s-filter" class="screen">
  <div class="topbar">
    <button class="btn-back" onclick="showScreen('s-home')">← Accueil</button>
    <span>Filtre Allergies</span>
    <button class="btn-reset" onclick="resetFilter()">Reset ✕</button>
  </div>
  <div class="content">
    <div class="allergen-grid" id="ag"></div>
    <div id="fr"></div>
  </div>
</div>

<div id="s-list" class="screen">
  <div class="topbar">
    <button class="btn-back" onclick="showScreen('s-home')">← Accueil</button>
    <span>Liste des Aliments</span>
    <span></span>
  </div>
  <div class="content">
    <ul class="food-list" id="fl"></ul>
  </div>
</div>

<div class="modal-overlay" id="mo" onclick="overlayClick(event)">
  <div class="modal" id="mb"></div>
</div>

<script src="data.js"></script>
<script>
var SEL = new Set();

function showScreen(id) {
  var all = document.querySelectorAll(".screen");
  for (var i = 0; i < all.length; i++) all[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function buildCheckboxes() {
  var g = document.getElementById("ag");
  for (var i = 0; i < ALLERGEN_KEYS.length; i++) {
    var key = ALLERGEN_KEYS[i];
    var d = document.createElement("div");
    d.className = "allergen-item";
    d.dataset.key = key;
    var ic = document.createElement("span");
    ic.className = "check-icon";
    var lb = document.createElement("span");
    lb.textContent = ALLERGEN_LABELS[key];
    d.appendChild(ic);
    d.appendChild(lb);
    d.addEventListener("click", makeToggle(key, d));
    g.appendChild(d);
  }
}

function makeToggle(key, el) {
  return function() {
    if (SEL.has(key)) { SEL.delete(key); el.classList.remove("checked"); }
    else { SEL.add(key); el.classList.add("checked"); }
    renderResults();
  };
}

function resetFilter() {
  SEL.clear();
  var items = document.querySelectorAll(".allergen-item");
  for (var i = 0; i < items.length; i++) items[i].classList.remove("checked");
  renderResults();
}

function renderResults() {
  var c = document.getElementById("fr");
  if (SEL.size === 0) { c.innerHTML = ""; return; }
  var keys = Array.from(SEL);
  var rouge = [], orange = [], safe = [];
  for (var i = 0; i < foods.length; i++) {
    var food = foods[i];
    var max = "ok";
    for (var j = 0; j < keys.length; j++) {
      var v = food.allergens[keys[j]];
      if (v === "rouge") { max = "rouge"; break; }
      if (v === "orange") max = "orange";
    }
    if (max === "rouge") rouge.push(food);
    else if (max === "orange") orange.push(food);
    else safe.push(food);
  }
  var html = "";
  if (rouge.length) {
    html += "<div class=\"result-group\"><h3>🔴 Contient (" + rouge.length + ")</h3><div>";
    for (var i = 0; i < rouge.length; i++) html += makeTag(rouge[i], "rouge");
    html += "</div></div>";
  }
  if (orange.length) {
    html += "<div class=\"result-group\"><h3>🟠 Variable (" + orange.length + ")</h3><div>";
    for (var i = 0; i < orange.length; i++) html += makeTag(orange[i], "orange");
    html += "</div></div>";
  }
  if (safe.length) {
    html += "<div class=\"result-group\"><h3>✅ Sans risque (" + safe.length + ")</h3><div>";
    for (var i = 0; i < safe.length; i++) html += makeTag(safe[i], "vert");
    html += "</div></div>";
  }
  c.innerHTML = html;
  var tags = c.querySelectorAll(".food-tag");
  for (var i = 0; i < tags.length; i++) {
    tags[i].addEventListener("click", makeFoodClick(tags[i].dataset.name));
  }
}

function makeTag(food, cls) {
  return "<span class=\"food-tag " + cls + "\" data-name=\"" + food.name.replace(/"/g, "&quot;") + "\">" + food.name + "</span>";
}

function buildList() {
  var ul = document.getElementById("fl");
  for (var i = 0; i < foods.length; i++) {
    var food = foods[i];
    var li = document.createElement("li");
    var sp = document.createElement("span");
    sp.textContent = food.name;
    var ar = document.createElement("span");
    ar.className = "arrow";
    ar.textContent = "›";
    li.appendChild(sp);
    li.appendChild(ar);
    li.addEventListener("click", makeFoodClick(food.name));
    ul.appendChild(li);
  }
}

function makeFoodClick(name) {
  return function() { openModal(name); };
}

function openModal(name) {
  var food = null;
  for (var i = 0; i < foods.length; i++) {
    if (foods[i].name === name) { food = foods[i]; break; }
  }
  if (!food) return;
  var notes = food.notes || {};
  var ak = [], sk = [];
  var skip = ["vegan","vegetarien","halal","casher"];
  for (var i = 0; i < ALLERGEN_KEYS.length; i++) {
    var k = ALLERGEN_KEYS[i];
    if (food.allergens[k]) ak.push(k);
    else if (skip.indexOf(k) === -1) sk.push(k);
  }
  var h = "<h2>" + food.name + "</h2>";
  if (ak.length === 0) {
    h += "<div class=\"success-box\"><div class=\"ico\">✅</div><div class=\"ok\">Aucun allergène connu</div><div class=\"sub\">Vérifiez l'étiquette du produit</div></div>";
  } else {
    h += "<div class=\"modal-section\"><h3>Allergènes</h3>";
    for (var i = 0; i < ak.length; i++) {
      var k = ak[i];
      var lv = food.allergens[k];
      var bt = lv === "rouge" ? "⛔ Contient" : "⚠️ Variable";
      h += "<div class=\"allergen-row\"><span>" + ALLERGEN_LABELS[k] + "</span><span class=\"badge " + lv + "\">" + bt + "</span></div>";
      if (notes[k]) h += "<div class=\"modal-expl\">" + notes[k] + "</div>";
    }
    h += "</div>";
  }
  if (sk.length > 0) {
    h += "<div class=\"modal-section\"><h3>Compatible avec</h3><div class=\"badge-list\">";
    for (var i = 0; i < sk.length; i++) h += "<span class=\"badge vert\">" + ALLERGEN_LABELS[sk[i]] + "</span>";
    h += "</div></div>";
  }
  h += "<button class=\"btn-close\" onclick=\"closeModal()\">Fermer</button>";
  document.getElementById("mb").innerHTML = h;
  document.getElementById("mo").classList.add("open");
}

function overlayClick(e) {
  if (e.target === document.getElementById("mo")) closeModal();
}
function closeModal() {
  document.getElementById("mo").classList.remove("open");
}

buildCheckboxes();
buildList();
</script>
</body>
</html>
